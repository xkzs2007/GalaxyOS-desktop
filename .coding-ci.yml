# GalaxyOS CI/CD — CNB (Coding.net) 兼容格式
# 备选方案，若 .github/workflows 不生效可用此文件

version: "1.0"

stages:
  - name: test
    label: 测试
    image: python:3.13-slim
    steps:
      - name: install-system-deps
        run: |
          apt-get update -qq && apt-get install -y -qq build-essential 2>&1 | tail -1
      - name: install-python-deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: run-tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov-report=term-missing \
            -p no:warnings

  - name: lint
    label: 代码检查
    image: python:3.13-slim
    steps:
      - name: ruff
        run: |
          pip install ruff
          ruff check --select=E,F,W --ignore=E501,E402 services/ || true
