# ════════════════════════════════════════════════════════════════
# GalaxyOS v9.4 — CNB 云原生构建配置
#
# 策略：Dockerfile.ci 预装全部依赖 → Docker layer 缓存 → CI 秒级启动
#
# v9.4 变更：
#   - 删 security-check (injection_scanner) — v8.6 OpenClaw 集成残留
#   - 删 node-check (extensions/galaxyos/index.js) — v8.6 Node 插件残留
#   - 删 $:tag_push 的 Rust 编译 (extensions/galaxyos/native) — v8.6 原生扩展残留
#   - 加 desktop-shell smoke stage — 验证 v9.4 桌面端能 import
# ════════════════════════════════════════════════════════════════

# ── main 分支：完整测试 ──
main:
  push:
    # Python 全量测试（用预构建镜像，依赖已缓存）
    - name: python-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: compile-check
          script: |
            python -c "
            import py_compile, os, sys
            problems = []
            for root, dirs, files in os.walk('.'):
                dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt')]
                for f in files:
                    if f.endswith('.py'):
                        path = os.path.join(root, f)
                        try: py_compile.compile(path, doraise=True)
                        except py_compile.PyCompileError: problems.append(path)
            if problems:
                print(f'FAILED: {len(problems)} files')
                for p in problems: print(f'  {p}')
                sys.exit(1)
            print(f'OK: all Python files compile on {sys.version}')
            "
        - name: pytest
          script: |
            python -m pytest tests/ -v --tb=short -p no:warnings --ignore=tests/test_cognitive_map.py --ignore=tests/test_chain_of_verification.py --ignore=tests/test_thinking_enhanced.py --ignore=tests/test_emotion_memory.py --ignore=tests/test_context_compressor.py --ignore=tests/test_memgas_skvm.py --ignore=tests/test_rag_optimizer.py --ignore=tests/test_biorhythm_sleep.py --ignore=tests/test_memory_consolidation.py --ignore=tests/test_nlp_enhanced.py --ignore=tests/test_imports.py
        - name: harness-import-check
          script: |
            # v9.4 harness 入口必须能 import（不要求 key）
            python -c "
            from galaxyos.harness import create_galaxy_agent
            from galaxyos.harness.sidecar_bridge import build_sidecar_backend, build_provider_backend
            print('OK: harness + sidecar_bridge importable')
            "
        - name: desktop-shell-import-check
          script: |
            # v9.4 desktop-shell 多 provider / 多 slot 模块必须能 import
            cd desktop-shell
            python -c "
            import sys; sys.path.insert(0, 'python')
            from llm_providers import (
                LLMBackend, OpenAICompatClient, AnthropicClient,
                MockLLMClient, MultiSlotRouter, build_llm_backend,
                MAINSTREAM_PROVIDERS,
            )
            from galaxyos_sidecar import SidecarHandlers
            from tokui_dsl import (
                open_bubble_ai, close_bubble, answer_paragraph,
                progress_bar, upd, callout, plan_step, tool_result,
            )
            assert len(MAINSTREAM_PROVIDERS) >= 10, 'provider catalogue too small'
            r = MultiSlotRouter()
            assert r.SLOTS == ('llm', 'llm_pro', 'embedding', 'rerank', 'vlm'), 'v9.4 5-slot contract broken'
            for slot in r.SLOTS:
                assert r.is_enabled(slot) is False, f'{slot} should start disabled'
            print(f'OK: desktop-shell imports + 5-slot router ({len(r.SLOTS)} slots)')
            "

    # 多 LLM provider 路由测试（v9.2-v9.4 核心，单独跑保证不被其他测试拖垮）
    - name: llm-provider-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: provider-tests
          script: |
            python -m pytest tests/test_llm_providers.py tests/test_sidecar_set_config.py tests/test_harness_sidecar_bridge.py -v --tb=short

    # Secret 扫描（轻量，并行）
    - name: secret-scan
      docker:
        image: python:3.12
      stages:
        - name: hardcoded-keys
          script: |
            FOUND=0
            grep -rPn 'sk-[a-zA-Z0-9]{20,}' services/ extensions/ galaxyos/ scripts/ tests/ desktop-shell/ 2>/dev/null && FOUND=1
            grep -rPn '(ghp_|gho_|cnb_)[a-zA-Z0-9]{20,}' services/ extensions/ galaxyos/ scripts/ tests/ desktop-shell/ 2>/dev/null && FOUND=1
            [ "$FOUND" -ne 0 ] && echo "FOUND secrets" && exit 1
            echo "OK: no hardcoded secrets"

  pull_request:
    - name: pr-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: compile-check
          script: |
            python -c "
            import py_compile, os, sys
            problems = []
            for root, dirs, files in os.walk('.'):
                dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt')]
                for f in files:
                    if f.endswith('.py'):
                        path = os.path.join(root, f)
                        try: py_compile.compile(path, doraise=True)
                        except py_compile.PyCompileError: problems.append(path)
            if problems:
                print(f'FAILED: {len(problems)} files')
                sys.exit(1)
            print('OK: compile check passed')
            "
        - name: pytest
          script: python -m pytest tests/test_llm_providers.py tests/test_sidecar_set_config.py tests/test_harness_sidecar_bridge.py -v --tb=short -p no:warnings


# ── Tag 推送：v9.4 PyInstaller 打包桌面端 ──
# 之前的 Rust 编译（extensions/galaxyos/native → lfm_server / galaxyos-native）
# 是 v8.6 OpenClaw 时代产物，v9.0 起 desktop-shell 改成纯 Python + Electron。
# 桌面端打包用 PyInstaller（见 desktop-shell/scripts/），需要 PyInstaller 镜像。
$:
  tag_push:
    # 桌面端 sidecar PyInstaller 打包
    - name: build-desktop-sidecar
      label:
        type: RELEASE
      docker:
        image: python:3.12
      stages:
        - name: install-deps
          script: |
            pip install --no-cache-dir -i https://mirrors.tencent.com/pypi/simple \
              -r requirements-core.txt pyinstaller
        - name: pyinstaller-sidecar
          script: |
            cd desktop-shell
            pyinstaller \
              --onefile \
              --name galaxyos-sidecar \
              --add-data "python/tokui_dsl.py:python" \
              --add-data "python/llm_providers.py:python" \
              --hidden-import=llm_providers \
              --hidden-import=galaxyos_sidecar \
              --hidden-import=tokui_dsl \
              python/galaxyos_sidecar.py 2>&1 | tail -20
            mkdir -p /tmp/artifacts/desktop
            cp dist/galaxyos-sidecar /tmp/artifacts/desktop/ 2>/dev/null || true
            ls -la /tmp/artifacts/desktop/
        - name: package
          script: |
            cd /tmp/artifacts
            tar czf galaxyos-desktop-${CNB_BRANCH}.tar.gz desktop/
            echo "Packaged: galaxyos-desktop-${CNB_BRANCH}.tar.gz"
