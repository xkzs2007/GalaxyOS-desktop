# ════════════════════════════════════════════════════════════════
# GalaxyOS v9.4 — CNB 云原生构建配置
#
# 策略：Dockerfile.ci 预装全部依赖 → Docker layer 缓存 → CI 秒级启动
#
# v9.4 变更：
#   - 删 security-check (injection_scanner) — v8.6 OpenClaw 集成残留
#   - 删 node-check (extensions/galaxyos/index.js) — v8.6 Node 插件残留
#   - 删 $:tag_push 的 Rust 编译 (extensions/galaxyos/native) — v8.6 原生扩展残留
#   - 加 desktop-shell smoke stage — 验证 v9.4 桌面端能 import
#   - 加 sync-to-github stage (main.push) — cnb → GH 镜像，
#     让 GH Actions 跑 Windows NSIS / Linux x64 AppImage build
#     (cnb 自己的 arm64 AppImage 见 $:tag_push)
# ════════════════════════════════════════════════════════════════

# Optional: import the GH deploy key from a private cnb "key"
# repo so the sync-to-github stage can authenticate via SSH.
#   Setup steps (one-time):
#     1. Create a private cnb repo, e.g. TIAMO.xianyao/git-keys
#     2. In that repo, add a file `github_deploy_key.env`
#        containing the FULL private key contents (multiline):
#            GH_SSH_KEY="-----BEGIN OPENSSH PRIVATE KEY-----
#            b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
#            QyNTUxOQAAACASIYDQAXNdkfEVERGT6qrIobj4cFmF8jHFRB8V0gAVQAAAJiVjJ3tZZ
#            ... (full key, including the trailing
#            -----END OPENSSH PRIVATE KEY----- line)
#            "
#        Quote with "..." because the value contains newlines
#        and equals signs that .env parsing would otherwise mangle.
#     3. Uncomment the imports: block below and update the URL
#        to point at your key repo's .env file.
#     4. Push this .cnb.yml — the sync-to-github stage will pick
#        up GH_SSH_KEY automatically and start mirroring to GH.
#   Without the import (or if GH_SSH_KEY is unset), sync-to-github
#   fails at runtime; other stages (tests, arm64 build) keep
#   running normally.
#
# The PUBLIC key (which you need to add to GitHub as a deploy
# key, with "Allow write access" enabled) is in the chat thread.
# DO NOT paste the private key into GitHub — only the public key.
#imports:
#  - https://cnb.cool/TIAMO.xianyao/git-keys/-/blob/main/github_deploy_key.env


# ── main 分支：完整测试 ──
main:
  push:
    # Python 全量测试（用预构建镜像，依赖已缓存）
    - name: python-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: compile-check
          script: |
            python -c "
            import py_compile, os, sys
            problems = []
            for root, dirs, files in os.walk('.'):
                dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt')]
                for f in files:
                    if f.endswith('.py'):
                        path = os.path.join(root, f)
                        try: py_compile.compile(path, doraise=True)
                        except py_compile.PyCompileError: problems.append(path)
            if problems:
                print(f'FAILED: {len(problems)} files')
                for p in problems: print(f'  {p}')
                sys.exit(1)
            print(f'OK: all Python files compile on {sys.version}')
            "
        - name: pytest
          script: |
            python -m pytest tests/ -v --tb=short -p no:warnings --ignore=tests/test_cognitive_map.py --ignore=tests/test_chain_of_verification.py --ignore=tests/test_thinking_enhanced.py --ignore=tests/test_emotion_memory.py --ignore=tests/test_context_compressor.py --ignore=tests/test_memgas_skvm.py --ignore=tests/test_rag_optimizer.py --ignore=tests/test_biorhythm_sleep.py --ignore=tests/test_memory_consolidation.py --ignore=tests/test_nlp_enhanced.py --ignore=tests/test_imports.py
        - name: harness-import-check
          script: |
            # v9.4 harness 入口必须能 import（不要求 key）
            python -c "
            from galaxyos.harness import create_galaxy_agent
            from galaxyos.harness.sidecar_bridge import build_sidecar_backend, build_provider_backend
            print('OK: harness + sidecar_bridge importable')
            "
        - name: desktop-shell-import-check
          script: |
            # v9.4 desktop-shell 多 provider / 多 slot 模块必须能 import
            cd desktop-shell
            python -c "
            import sys; sys.path.insert(0, 'python')
            from llm_providers import (
                LLMBackend, OpenAICompatClient, AnthropicClient,
                MockLLMClient, MultiSlotRouter, build_llm_backend,
                MAINSTREAM_PROVIDERS,
            )
            from galaxyos_sidecar import SidecarHandlers
            from tokui_dsl import (
                open_bubble_ai, close_bubble, answer_paragraph,
                progress_bar, upd, callout, plan_step, tool_result,
            )
            assert len(MAINSTREAM_PROVIDERS) >= 10, 'provider catalogue too small'
            r = MultiSlotRouter()
            assert r.SLOTS == ('llm', 'llm_pro', 'embedding', 'rerank', 'vlm'), 'v9.4 5-slot contract broken'
            for slot in r.SLOTS:
                assert r.is_enabled(slot) is False, f'{slot} should start disabled'
            print(f'OK: desktop-shell imports + 5-slot router ({len(r.SLOTS)} slots)')
            "

    # 多 LLM provider 路由测试（v9.2-v9.4 核心，单独跑保证不被其他测试拖垮）
    - name: llm-provider-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: provider-tests
          script: |
            python -m pytest tests/test_llm_providers.py tests/test_sidecar_set_config.py tests/test_harness_sidecar_bridge.py -v --tb=short

    # Secret 扫描（轻量，并行）
    - name: secret-scan
      docker:
        image: python:3.12
      stages:
        - name: hardcoded-keys
          script: |
            FOUND=0
            grep -rPn 'sk-[a-zA-Z0-9]{20,}' services/ extensions/ galaxyos/ scripts/ tests/ desktop-shell/ 2>/dev/null && FOUND=1
            grep -rPn '(ghp_|gho_|cnb_)[a-zA-Z0-9]{20,}' services/ extensions/ galaxyos/ scripts/ tests/ desktop-shell/ 2>/dev/null && FOUND=1
            [ "$FOUND" -ne 0 ] && echo "FOUND secrets" && exit 1
            echo "OK: no hardcoded secrets"

    # Sync cnb → GitHub (gh mirror).
    # When a push lands on cnb's main branch (or a tag is pushed
    # and triggers `tag_push` below), this stage re-pushes the
    # same refs to git@github.com:xkzs2007/GalaxyOS-desktop.git
    # so GH Actions (.github/workflows/release.yml) can run the
    # Windows NSIS + Linux x64 AppImage builds that cnb runners
    # can't produce.
    #
    # Auth: SSH deploy key. Less privileged than a PAT — a deploy
    # key is scoped to a single repo and can be revoked from the
    # repo's settings page without rotating anything else.
    #
    # Required setup (one-time):
    #   1. Generate an SSH key pair on a trusted host (already
    #      done — public key is in the chat). Use ed25519 (modern,
    #      256-bit, much shorter than RSA).
    #   2. On GitHub, go to the repo's Settings → Deploy keys →
    #      Add deploy key. Paste the PUBLIC key, give it a title
    #      like "cnb sync bot", and CHECK "Allow write access".
    #   3. On cnb, store the PRIVATE key in a key repo (or the
    #      repo's runtime env). The private key is referenced as
    #      ${GH_SSH_KEY} below.
    #   4. Uncomment the imports: block at the top of this file
    #      and update the URL to point at the file holding
    #      GH_SSH_KEY=<full private key content, multiline>.
    #
    # Without the import (or if GH_SSH_KEY is unset), the
    # sync-to-github stage fails at runtime; other stages (tests,
    # arm64 build) keep running normally.
    - name: sync-to-github
      # DISABLED when GH_SSH_KEY is unset: this stage uses SSH deploy
      # key auth (GH_SSH_KEY env), which requires a private cnb key
      # repo + the imports: block at the top of this file. We never
      # set that up, so previously every main.push run failed here
      # with "SSH key not provided".
      #
      # main → GH sync is handled by GH Actions instead — see
      # .github/workflows/release.yml "sync-to-cnb" job which pushes
      # the REVERSE direction (GH → cnb) using CNB_TOKEN. Since GH
      # is the source of truth for release tags (tag_push triggers
      # GH Actions for windows-x64 + linux-x64 builds), the
      # cnb → GH direction is not needed.
      #
      # To re-enable (if you want cnb to push to GH on every main.push):
      #   1. Generate ed25519 SSH keypair
      #   2. Add public key to GitHub repo Settings → Deploy keys (write)
      #   3. Create private cnb repo TIAMO.xianyao/git-keys with file
      #      github_deploy_key.env containing:
      #        GH_SSH_KEY="<full private key contents>"
      #   4. Uncomment the imports: block at top of this file
      #   5. Remove the `if:` line below so the stage always runs
      # Run only if GH_SSH_KEY env var is non-empty — skip silently
      # otherwise. Without this, the stage fails the whole pipeline.
      if: |
        [ -n "$GH_SSH_KEY" ]
      stages:
        - name: sync
          image: tencentcom/git-sync
          settings:
            target_url: git@github.com:xkzs2007/GalaxyOS-desktop.git
            auth_type: ssh
            ssh_key: ${GH_SSH_KEY}
            push_tags: true
            sync_mode: push)

  pull_request:
    - name: pr-test
      docker:
        build:
          dockerfile: Dockerfile.ci
          by:
            - Dockerfile.ci
            - .cnb.yml
      stages:
        - name: compile-check
          script: |
            python -c "
            import py_compile, os, sys
            problems = []
            for root, dirs, files in os.walk('.'):
                dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt')]
                for f in files:
                    if f.endswith('.py'):
                        path = os.path.join(root, f)
                        try: py_compile.compile(path, doraise=True)
                        except py_compile.PyCompileError: problems.append(path)
            if problems:
                print(f'FAILED: {len(problems)} files')
                sys.exit(1)
            print('OK: compile check passed')
            "
        - name: pytest
          script: python -m pytest tests/test_llm_providers.py tests/test_sidecar_set_config.py tests/test_harness_sidecar_bridge.py -v --tb=short -p no:warnings


# ── Tag 推送：桌面端打包 ──
#
# 分工策略（v0.1.0 起）：
#   - Windows x64 + Linux x64 → GitHub Actions（GH 有免费 windows/ubuntu x64 runner）
#   - Linux arm64             → CNB（GH arm64 runner 排队太久，CNB arm64 充足）
#
# CNB tag_push 跑 arm64 PyInstaller sidecar + electron-builder AppImage，
# 产出上传到 CNB 制品库（可通过 CNB Release 页面下载）。
$:
  tag_push:
    - name: build-desktop-linux-arm64
      label:
        type: RELEASE
      # CNB arm64 runner（腾讯云国内 arm64 机器充足，不像 GH 排队 30 分钟+）
      runner:
        tags: cnb:arch:arm64:v8
      docker:
        image: python:3.12
      stages:
        - name: install-system-deps
          script: |
            # electron-builder AppImage 需要 libfuse2 + fakeroot
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends \
              fakeroot rpm libfuse2 \
              libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2 \
              python3-dev build-essential \
              curl ca-certificates  # Rust toolchain deps: curl 下载 rustup，gcc 链接 native code
            # Node 20 for electron-builder
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y -qq nodejs
            # Rust stable toolchain（arm64-unknown-linux-gnu target 默认就是
            # 当前架构 aarch64，无需额外加 --target）
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            source "$HOME/.cargo/env"
            rustc --version
            cargo --version

        - name: build-lfm-server
          script: |
            # 编 lfm_server Rust binary（arm64-unknown-linux-gnu，跟当前
            # runner 架构一致，无需 --target）。--no-default-features 跳过
            # PyO3 cdylib（desktop 端不需要 Python 扩展，只要 standalone binary）。
            source "$HOME/.cargo/env"
            cd extensions/galaxyos/native
            cargo build --release --bin lfm_server --no-default-features
            test -f target/release/lfm_server || { echo "ERROR: lfm_server not built"; exit 1; }
            ls -lh target/release/lfm_server
            # electron-builder 的 extraResources filter 期望文件路径是
            # extensions/galaxyos/native/target/release/lfm_server
            # （见 desktop-shell/package.json build.extraResources）。
            # 所以留在原地即可，不需要复制。

        - name: install-python-deps
          script: |
            # 用 desktop-shell 一样的 curated dep list（不装 torch/transformers 等重型包）
            pip install --no-cache-dir -i https://mirrors.tencent.com/pypi/simple \
              pyinstaller==6.6.0 \
              pyinstaller-hooks-contrib==2024.6 \
              numpy scipy pydantic orjson httpx requests \
              pyzmq pillow polars duckdb \
              jieba tiktoken ncps openai psutil aiohttp scikit-learn \
              uvloop tokenizers

        - name: bundle-sidecar
          script: |
            cd desktop-shell/python
            pyinstaller --clean --noconfirm galaxyos-sidecar.spec
            ls -la dist/
            # 重命名带架构后缀
            mv dist/galaxyos-sidecar dist/galaxyos-sidecar-linux-arm64
            chmod +x dist/galaxyos-sidecar-linux-arm64
            # 复制回 electron-builder 期望的位置
            cp dist/galaxyos-sidecar-linux-arm64 dist/galaxyos-sidecar
            ls -la dist/

        - name: build-electron-appimage
          script: |
            cd desktop-shell
            # 准备 build/icon.png + build/icon.ico（build/ 是 gitignored）
            mkdir -p build
            cp renderer/icon.png build/icon.png
            python -c "
            from PIL import Image
            im = Image.open('renderer/icon.png').convert('RGBA')
            im.save('build/icon.ico', format='ICO',
                    sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
            "
            # 装 npm deps
            npm install --no-audit --no-fund
            # esbuild main + preload
            npx esbuild src/main.ts \
              --bundle --platform=node --target=node20 --format=cjs \
              --outfile=dist/main.cjs \
              --external:electron --external:fsevents --external:zeromq \
              --sourcemap
            npx esbuild src/preload.ts \
              --bundle --platform=node --target=node20 --format=cjs \
              --outfile=dist/preload.cjs \
              --external:electron --sourcemap
            test -f dist/main.cjs || { echo "ERROR: dist/main.cjs missing"; exit 1; }
            # electron-builder 出 AppImage（arm64）
            npx electron-builder --linux AppImage --arm64 --publish never 2>&1 | tail -30
            ls -la release/

        - name: package-artifacts
          script: |
            mkdir -p /tmp/artifacts/desktop-arm64
            cp desktop-shell/release/*.AppImage /tmp/artifacts/desktop-arm64/ 2>/dev/null || true
            cp desktop-shell/python/dist/galaxyos-sidecar-linux-arm64 /tmp/artifacts/desktop-arm64/ 2>/dev/null || true
            # 也打包 lfm_server binary（用户可单独下载部署到无 ONNX 模型
            # 的旧 AppImage 安装目录，作为热更新）
            cp extensions/galaxyos/native/target/release/lfm_server /tmp/artifacts/desktop-arm64/lfm_server-linux-arm64 2>/dev/null || true
            ls -la /tmp/artifacts/desktop-arm64/
            cd /tmp/artifacts
            tar czf galaxyos-desktop-linux-arm64-${CNB_BRANCH}.tar.gz desktop-arm64/
            echo "Packaged: galaxyos-desktop-linux-arm64-${CNB_BRANCH}.tar.gz"

