# GalaxyOS CI/CD — CNB (Cloud Native Build) 原生配置
# 参考: https://cnb.cool/docs/ci/overview

branch:
  - main
  - master

# ── 全局环境 ──
env:
  PYTHONUNBUFFERED: "1"

# ── 流水线阶段 ──
stages:
  - name: test
    label: 🧪 测试
    image: python:3.12-slim
    steps:
      - name: setup
        run: |
          apt-get update -qq && apt-get install -y -qq build-essential
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: verify-imports
        run: |
          python -c "import numpy, scipy, sklearn, torch, pydantic, faiss, jieba, ncps"
          echo "✅ All core deps loaded"
      - name: run-tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=services --cov-report=term-missing \
            -p no:warnings

  - name: lint
    label: 📋 代码检查
    image: python:3.12-slim
    steps:
      - name: ruff
        run: |
          pip install ruff
          ruff check --select=E,F,W --ignore=E501,E402 services/ tests/ || true
          echo "✅ Lint complete"

  - name: security
    label: 🔒 安全扫描
    image: python:3.12-slim
    steps:
      - name: detect-secrets
        run: |
          echo "🔍 扫描硬编码密钥..."
          if grep -rP 'sk-[a-zA-Z0-9]{20,}' services/ extensions/ 2>/dev/null; then
            echo "❌ 发现疑似 API Key！" && exit 1
          fi
          if grep -rPni "api_key\s*=\s*'[^Y][^O][^U]|api_key\s*=\s*\"[^Y][^O][^U]" services/ 2>/dev/null; then
            echo "⚠️  发现可疑硬编码，请检查" && exit 1
          fi
          echo "✅ 密钥扫描通过"
      - name: critical-imports
        run: |
          python -c "
          from services.exceptions import SkillError
          from services.unified_cache import UnifiedCache
          from services.adaptive_rrf import AdaptiveRRF
          print('✅ 核心模块导入正常')
          "

  - name: build
    label: 📦 打包
    image: python:3.12-slim
    steps:
      - name: build-package
        run: |
          pip install build
          python -m build
          echo "✅ 包构建成功"

  - name: node-check
    label: 🟢 Node.js 依赖检查
    image: node:22-slim
    steps:
      - name: install-and-verify
        run: |
          echo "🔍 扫描所有 Node.js 包..."
          PKG_DIRS=$(find skills extensions -name package.json -not -path "*/node_modules/*" 2>/dev/null | xargs -I{} dirname {})
          PASS=0; FAIL=0
          for dir in $PKG_DIRS; do
            if grep -q '"dependencies"' "$dir/package.json" 2>/dev/null; then
              echo "📦 $dir"
              cd "$dir"
              if npm install --legacy-peer-deps 2>&1 | tail -1; then
                echo "   ✅ $dir 依赖安装成功"
                PASS=$((PASS+1))
              else
                echo "   ⚠️  $dir 依赖安装失败（继续）"
                FAIL=$((FAIL+1))
              fi
              cd /workspace
            fi
          done
          echo "✅ Node.js 依赖检查完成: $PASS 通过, $FAIL 失败"
          [ $FAIL -gt 0 ] && echo "⚠️  有 $FAIL 个包依赖安装失败" || true

  - name: rust-check
    label: 🦀 Rust 编译检查
    image: rust:1.85-slim-bookworm
    steps:
      - name: cargo-check
        run: |
          cd extensions/galaxyos/native
          echo "🔍 cargo check (快速语法/类型检查)..."
          cargo check 2>&1
          echo ""
          echo "🔧 cargo test..."
          cargo test 2>&1 || echo "⚠️  无测试或测试失败（继续）"
          echo ""
          echo "📦 cargo build --release..."
          cargo build --release 2>&1
          echo "✅ Rust 构建完成"
          ls -lh target/release/galaxyos-native 2>/dev/null || true

# ── Tag 推送触发 ──
"v*":
  tag_push:
    - stages:
        - name: setup
          run: |
            apt-get update -qq && apt-get install -y -qq build-essential
            pip install --upgrade pip
            pip install -r requirements.txt
        - name: verify-version
          run: |
            echo "Tag: $CNB_BRANCH"
            cat VERSION
            python -c "
import sys
sys.path.insert(0, '.')
v = open('VERSION').read().strip()
tag = '$CNB_BRANCH'.lstrip('v')
assert tag == v, f'Tag {tag} != VERSION {v}'
print(f'✅ Tag {tag} matches VERSION')
"
        - name: verify-imports
          run: |
            python -c "import numpy, scipy, sklearn, torch, pydantic, faiss, jieba"
            echo "✅ Core deps loaded"
        - name: run-tests
          run: |
            pip install pytest pytest-cov
            python -m pytest tests/ -v --tb=short -p no:warnings || true
        - name: build-package
          run: |
            pip install build
            python -m build
            echo "✅ 包构建成功"

# ── 通知 ──
notifications:
  - type: webhook
    events: [success, failure]
