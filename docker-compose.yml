# GalaxyOS Docker Compose 配置
# 用法: docker compose up
#
version: "3.9"

services:
  galaxyos:
    build: .
    image: galaxyos:latest
    container_name: galaxyos
    volumes:
      # 配置文件（复制 config/llm_config.example.json 为 llm_config.json 填入 API Key）
      - ./config:/app/config:ro
    environment:
      - OPENCLAW_WORKSPACE=/app/workspace
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import services; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
