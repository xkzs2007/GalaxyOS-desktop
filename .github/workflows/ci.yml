name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  check-deps:
    name: Dependency check (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install core dependencies
        run: pip install -r requirements-core.txt

      - name: Install openjiuwen with compatible versions
        run: |
          pip install "openjiuwen>=0.1.13"
          pip install "pymilvus>=2.6.2,<2.6.10"

      - name: Install onnxruntime
        run: pip install onnxruntime

      - name: Verify critical imports
        run: |
          python -c "import fastmcp; print('fastmcp:', fastmcp.__version__)"
          python -c "import openjiuwen; print('openjiuwen:', openjiuwen.__version__)"
          python -c "import starlette; print('starlette:', starlette.__version__)"
          python -c "import uvicorn; print('uvicorn:', uvicorn.__version__)"
          python -c "import numpy; print('numpy:', numpy.__version__)"
          python -c "import pydantic; print('pydantic:', pydantic.__version__)"
          python -c "import onnxruntime; print('onnxruntime:', onnxruntime.__version__)"
          python -c "from openjiuwen.harness.factory import create_deep_agent; print('openjiuwen.harness OK')"
          python -c "from openjiuwen.harness.rails import SecurityRail, SysOperationRail; print('openjiuwen.rails OK')"
          python -c "from openjiuwen.core.foundation.llm.model import Model; print('openjiuwen.core OK')"

      - name: Verify GalaxyOS imports
        run: |
          pip install .
          python -c "from galaxyos.kernel.mcp_server_entry import create_kernel, check_dependencies; print('mcp_server_entry OK')"
          python -c "from galaxyos.kernel.agent_core_bridge import AgentCoreBridge; print('agent_core_bridge OK')"
          python -c "from galaxyos.kernel.memory_sync_bridge import MemorySyncBridge; print('memory_sync_bridge OK')"
          python -c "from galaxyos.kernel.i18n_manager import I18nManager; print('i18n_manager OK')"
          python -c "from galaxyos.kernel.dsl_bridge import DSLBridge; print('dsl_bridge OK')"
          python -c "from galaxyos.kernel.render_channel_router import RenderChannelRouter; print('render_channel_router OK')"
          python -c "from galaxyos.kernel.tokui_chat_adapter import TokuiChatAdapter; print('tokui_chat_adapter OK')"
          python -c "from galaxyos.kernel.tokui_degradation import TokUIDegradationManager; print('tokui_degradation OK')"
          python -c "from galaxyos.kernel.integration_config_manager import IntegrationConfigManager; print('integration_config_manager OK')"

      - name: Check no xiaoyi references in functional code
        run: |
          ! grep -r "from xiaoyi_claw_api\|import xiaoyi_claw_api\|from xiaoyi_memory\|import xiaoyi_memory" galaxyos/ --include="*.py" -l
          ! grep -r "xiaoyi-claw-omega-final" galaxyos/ --include="*.py" -l

  build-tauri:
    name: Tauri build check (Windows)
    runs-on: windows-latest
    needs: check-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Chocolatey)
        shell: powershell
        run: |
          choco install -y nsis

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install -r requirements-core.txt
          pip install "openjiuwen>=0.1.13"
          pip install "pymilvus>=2.6.2,<2.6.10"
          pip install onnxruntime pyinstaller

      - name: Download bge-small-zh ONNX model
        shell: bash
        run: |
          mkdir -p models/embeddings
          if [ -f models/embeddings/bge-small-zh.onnx ]; then
            echo "Model already exists, skipping download"
          else
            curl -sLf --retry 3 --retry-delay 5 --max-time 120 \
              "https://hf-mirror.com/BAAI/bge-small-zh-v1.5/resolve/main/onnx/model.onnx" \
              -o models/embeddings/bge-small-zh.onnx || \
            curl -sLf --retry 3 --retry-delay 5 --max-time 120 \
              "https://huggingface.co/BAAI/bge-small-zh-v1.5/resolve/main/onnx/model.onnx" \
              -o models/embeddings/bge-small-zh.onnx
            echo "Model downloaded: $(ls -lh models/embeddings/bge-small-zh.onnx)"
          fi

      - name: Install GalaxyOS
        shell: bash
        run: pip install .

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller galaxyos-mcp.spec --noconfirm

      - name: Verify native_translations packaged
        shell: bash
        run: |
          test -f dist/galaxyos-mcp/native_translations/zh.json || echo "WARNING: native_translations/zh.json not found in dist"
          test -f dist/galaxyos-mcp/native_translations/en.json || echo "WARNING: native_translations/en.json not found in dist"

      - name: Verify build output
        shell: bash
        run: |
          test -f dist/galaxyos-mcp/galaxyos-mcp.exe
          test -d dist/galaxyos-mcp/_internal

      - name: Prepare galaxyos-mcp-dist for Tauri
        shell: bash
        run: |
          cp -r dist/galaxyos-mcp galaxyos-mcp-dist

      - name: Download EUI-NEO SDK v0.5.2
        shell: bash
        run: |
          curl -sLf "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-sdk.zip" -o eui-neo-sdk.zip
          mkdir -p vendor/eui-neo/sdk
          cd vendor/eui-neo/sdk && unzip -q ../../../eui-neo-sdk.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -d "./lib" ] && [ -d "$top_dir/lib" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO SDK extracted"
          ls lib/ || { echo "ERROR: lib/ not found"; ls -la .; exit 1; }

      - name: Download EUI-NEO Runtime v0.5.2
        shell: bash
        run: |
          curl -sLf "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-runtime.zip" -o eui-neo-runtime.zip
          mkdir -p vendor/eui-neo/runtime
          cd vendor/eui-neo/runtime && unzip -q ../../../eui-neo-runtime.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -f "./gallery.exe" ] && [ -f "$top_dir/gallery.exe" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO Runtime extracted"
          ls ./

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri

      - name: Install tauri-cli
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop-tauri
        shell: bash
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          EUI_NEO_ROOT: "${{ github.workspace }}/vendor/eui-neo"

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-ci
          path: desktop-tauri/target/release/bundle/nsis/*.exe
