name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: pytest ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-core.txt

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-dev build-essential

      - name: Install Python dependencies (core only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Verify core imports
        run: |
          python -c "import numpy, scipy, sklearn, pydantic, httpx, jieba, pytest" || true
          python -c "import ncps" 2>/dev/null || echo "ncps not installed (optional)"
          echo "Core deps check done"

      - name: Compile check (all .py files)
        run: |
          python -c "
          import py_compile, os, sys
          problems = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt', 'release', 'dist', 'build', '_eval')]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          problems.append(path)
          if problems:
              print(f'{len(problems)} files failed to compile:')
              for p in problems: print(f'  {p}')
              sys.exit(1)
          print(f'All Python files compile on {sys.version}')
          "

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short -p no:warnings || true

      - name: Verify galaxyos package importable
        run: |
          python -c "
          from galaxyos.shared.constants import GALAXYOS_VERSION
          from galaxyos.shared.paths import galaxyos_home
          print(f'GalaxyOS v{GALAXYOS_VERSION} importable, home={galaxyos_home()}')
          "

      - name: Verify galaxyos.harness importable
        run: |
          python -c "
          from galaxyos.harness import create_galaxy_agent, GalaxyAgent, Workspace
          print('galaxyos.harness importable')
          " || echo "harness import skipped (optional deps missing)"

      - name: Verify galaxyos.kernel importable
        run: |
          python -c "
          from galaxyos.kernel.mcp_server import GalaxyOSMCPServer
          print('galaxyos.kernel.mcp_server importable')
          " || echo "kernel import skipped (optional deps missing)"

  build-check:
    name: Build wheel check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          ls -la dist/
          python -c "
          import zipfile, sys, os
          wheels = [f for f in os.listdir('dist') if f.endswith('.whl')]
          if not wheels:
              print('ERROR: no wheel found'); sys.exit(1)
          w = wheels[0]
          with zipfile.ZipFile(f'dist/{w}') as z:
              top = set(n.split('/')[0] for n in z.namelist() if '/' in n)
              print(f'Wheel: {w}')
              print(f'Top-level packages: {sorted(top)[:20]}')
          print('Wheel build OK')
          "
