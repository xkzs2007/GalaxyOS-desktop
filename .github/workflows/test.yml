name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# v9.4-adapted test workflow.
#
# Differences from the legacy cnb-era version (still in git history):
#   - `pip install -r requirements-core.txt` instead of full
#     requirements.txt (skips torch/transformers/faiss/etc. — 7GB
#     GH runners can't fit them).
#   - Only runs the v9.x test files (test_llm_providers,
#     test_sidecar_set_config, test_harness_sidecar_bridge) plus a
#     compile check. The legacy 12-test ignore list in .cnb.yml
#     references tests that import heavy ML deps and are not
#     exercised by the desktop-shell pipeline.
#   - Drops `node-check` (extensions/galaxyos/ was removed in v9.0;
#     pnpm install of a non-existent dir is the failure that broke
#     PR #2).
#   - Drops `rust-check` (extensions/galaxyos/native/ was removed
#     in v9.0; v9 desktop-shell is pure Python + Electron).
#   - Skips Codecov — not configured for this fork.
jobs:
  test:
    name: pytest ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-core.txt

      - name: Install system deps (for hnswlib compilation if pulled in)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq python3-dev build-essential

      - name: Install Python dependencies (core only)
        run: |
          python -m pip install --upgrade pip
          # requirements-core.txt is the lightweight set used by CI
          # (numpy/scipy/httpx/pydantic/etc.). Heavy ML deps
          # (torch/transformers/faiss) live in requirements-heavy.txt
          # and are NOT installed in GH CI.
          pip install -r requirements-core.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Verify core imports
        run: |
          python -c "import numpy, scipy, sklearn, pydantic, httpx, jieba, ncps, pytest, pytest_asyncio"
          echo "✅ All core deps loaded"

      - name: Compile check (all .py files)
        run: |
          python -c "
          import py_compile, os, sys
          problems = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt', 'release', 'dist', 'build')]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          problems.append(path)
          if problems:
              print(f'❌ {len(problems)} files failed to compile:')
              for p in problems: print(f'  {p}')
              sys.exit(1)
          print(f'✅ All Python files compile on {sys.version}')
          "

      - name: Run v9.x test suite
        run: |
          # v9.0–v9.4 test files only — the legacy 12 tests in
          # .cnb.yml --ignore list pull in heavy ML deps and are
          # out of scope for the desktop pipeline.
          python -m pytest \
            tests/test_llm_providers.py \
            tests/test_sidecar_set_config.py \
            tests/test_harness_sidecar_bridge.py \
            -v --tb=short -p no:warnings

      - name: Run desktop-shell import smoke test
        run: |
          # Validates the v9.4 desktop-shell contract: 5-slot
          # MultiSlotRouter default-disabled, provider catalogue
          # size, and the sidecar handlers importable. This is the
          # same check as the .cnb.yml "desktop-shell-import-check"
          # stage.
          cd desktop-shell
          python -c "
          import sys; sys.path.insert(0, 'python')
          from llm_providers import (
              LLMBackend, OpenAICompatClient, AnthropicClient,
              MockLLMClient, MultiSlotRouter, build_llm_backend,
              MAINSTREAM_PROVIDERS,
          )
          from galaxyos_sidecar import SidecarHandlers
          from tokui_dsl import (
              open_bubble_ai, close_bubble, answer_paragraph,
              progress_bar, upd, callout, plan_step, tool_result,
          )
          assert len(MAINSTREAM_PROVIDERS) >= 10, f'provider catalogue too small: {len(MAINSTREAM_PROVIDERS)}'
          r = MultiSlotRouter()
          assert r.SLOTS == ('llm', 'llm_pro', 'embedding', 'rerank', 'vlm'), 'v9.4 5-slot contract broken'
          for slot in r.SLOTS:
              assert r.is_enabled(slot) is False, f'{slot} should start disabled'
          print(f'OK: desktop-shell imports + 5-slot router ({len(r.SLOTS)} slots)')
          "

      - name: Run harness import smoke test
        run: |
          python -c "
          from galaxyos.harness import create_galaxy_agent
          from galaxyos.harness.sidecar_bridge import build_sidecar_backend, build_provider_backend
          print('OK: harness + sidecar_bridge importable')
          "
