name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kernel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INSTALL_HEAVY=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tauri:
    name: Build Tauri ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-24.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout GalaxyOS
        uses: actions/checkout@v4

      - name: Checkout JiuwenSwarm
        shell: bash
        run: |
          if git ls-remote https://github.com/xkzs2007/jiuwenswarm.git HEAD 2>/dev/null; then
            echo "Using GalaxyOS fork of JiuwenSwarm"
            GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 https://github.com/xkzs2007/jiuwenswarm.git jiuwenswarm
          else
            echo "GalaxyOS fork not found, using upstream JiuwenSwarm"
            GIT_LFS_SKIP_SMUDGE=1 git clone --depth 1 https://github.com/openJiuwen-ai/jiuwenswarm.git jiuwenswarm
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Patch JiuwenSwarm UI (homepage + sidebar hierarchy)
        shell: python
        run: |
          import pathlib, re
          src = pathlib.Path('jiuwenswarm/jiuwenswarm/channels/web/frontend/src')

          app_css = src / 'App.css'
          if app_css.exists():
              t = app_css.read_text(encoding='utf-8')
              patch = """
          /* === GalaxyOS Patch === */

          /* 1. Homepage: hide bee image, enlarge slogan with Serif */
          img[src*="bee"], img[src*="swarm"], img[alt*="bee"], img[alt*="Swarm"],
          .welcome-image, .empty-state-image, .hero-image {
              display: none !important;
          }
          .welcome-slogan, .empty-state-title, .hero-title,
          h1, h2.huge-title {
              font-family: 'Georgia', 'Garamond', 'Times New Roman', serif !important;
              font-weight: 800 !important;
              font-size: 2.5rem !important;
              letter-spacing: -0.02em !important;
          }

          /* 2. Sidebar hierarchy: single-side shadows for paddle1 > paddle2 > chat */
          nav, aside, [class*="sidebar"], [class*="Sidebar"],
          [class*="nav-panel"], [class*="NavPanel"],
          [class*="side-panel"]:first-of-type,
          [class*="paddle1"], [class*="Paddle1"] {
              box-shadow: 4px 0 12px -4px rgba(0,0,0,0.12) !important;
              z-index: 30 !important;
          }
          [class*="sub-sidebar"], [class*="SubSidebar"],
          [class*="nav-content"], [class*="NavContent"],
          [class*="side-panel"]:nth-of-type(2),
          [class*="paddle2"], [class*="Paddle2"] {
              box-shadow: 4px 0 12px -4px rgba(0,0,0,0.08) !important;
              z-index: 20 !important;
          }
          main, [class*="chat"], [class*="Chat"],
          [class*="content-area"], [class*="ContentArea"] {
              box-shadow: none !important;
              z-index: 10 !important;
          }

          /* 3. Paddle 1: clearer icons, remove text labels */
          nav [class*="nav-item"], nav [class*="NavItem"],
          [class*="sidebar"] > [class*="item"],
          [class*="paddle1"] [class*="item"] {
              font-size: 0 !important;
              line-height: 0 !important;
          }
          nav [class*="nav-item"] svg, nav [class*="NavItem"] svg,
          nav [class*="nav-item"] img, nav [class*="NavItem"] img,
          [class*="sidebar"] > [class*="item"] svg,
          [class*="sidebar"] > [class*="item"] img,
          [class*="paddle1"] [class*="item"] svg,
          [class*="paddle1"] [class*="item"] img {
              font-size: 20px !important;
              width: 20px !important;
              height: 20px !important;
          }

          /* 4. Paddle 2: remove all icons */
          [class*="sub-sidebar"] svg, [class*="SubSidebar"] svg,
          [class*="sub-sidebar"] img, [class*="SubSidebar"] img,
          [class*="nav-content"] svg, [class*="NavContent"] svg,
          [class*="paddle2"] svg, [class*="Paddle2"] svg,
          [class*="paddle2"] img, [class*="Paddle2"] img {
              display: none !important;
          }

          /* 5. Paddle 2 top: left-aligned Sans bold section title */
          [class*="sub-sidebar"]::before, [class*="SubSidebar"]::before,
          [class*="nav-content"]::before, [class*="NavContent"]::before,
          [class*="paddle2"]::before, [class*="Paddle2"]::before {
              content: attr(data-section-title) !important;
              display: block !important;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
              font-weight: 700 !important;
              font-size: 0.875rem !important;
              text-align: left !important;
              padding: 12px 16px 8px !important;
              color: #1a1a1a !important;
              letter-spacing: -0.01em !important;
          }
          """
              if 'GalaxyOS Patch' not in t:
                  t += patch
                  app_css.write_text(t, encoding='utf-8')
                  print('App.css patched: homepage + sidebar hierarchy')
              else:
                  print('App.css already patched')
          else:
              print('WARNING: App.css not found')

          idx_css = src / 'index.css'
          if idx_css.exists():
              t = idx_css.read_text(encoding='utf-8')
              if 'GalaxyOS Patch' not in t:
                  t += """
          /* GalaxyOS Patch: Serif fallback for headings */
          h1, h2.huge-title, .welcome-title {
              font-family: 'Georgia', 'Garamond', 'Times New Roman', serif !important;
              font-weight: 800 !important;
          }
          """
                  idx_css.write_text(t, encoding='utf-8')
                  print('index.css patched: Serif fallback')

      - name: Build JiuwenSwarm Web Frontend
        working-directory: jiuwenswarm/jiuwenswarm/channels/web/frontend
        shell: bash
        run: |
          npm install
          npm install @jboltai/tokui
          npx vite build --mode production

      - name: Copy Swarm dist for Tauri
        shell: bash
        run: |
          mkdir -p swarm-dist
          cp -r jiuwenswarm/jiuwenswarm/channels/web/frontend/dist/* swarm-dist/

      - name: Download EUI-NEO SDK v0.5.2
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sL "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-sdk.zip" -o eui-neo-sdk.zip
          mkdir -p vendor/eui-neo/sdk
          cd vendor/eui-neo/sdk && unzip -q ../../../eui-neo-sdk.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -d "./lib" ] && [ -d "$top_dir/lib" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO SDK extracted"
          ls lib/ || { echo "ERROR: lib/ not found"; ls -la .; exit 1; }

      - name: Download EUI-NEO Runtime v0.5.2
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sL "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-runtime.zip" -o eui-neo-runtime.zip
          mkdir -p vendor/eui-neo/runtime
          cd vendor/eui-neo/runtime && unzip -q ../../../eui-neo-runtime.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -f "./gallery.exe" ] && [ -f "$top_dir/gallery.exe" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO Runtime extracted"

      - name: Download EUI-NEO SDK v0.5.2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -sL "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-linux-x64-sdk.tar.gz" -o eui-neo-sdk.tar.gz
          mkdir -p vendor/eui-neo/sdk
          tar xzf eui-neo-sdk.tar.gz -C vendor/eui-neo/sdk
          top_dir=$(find vendor/eui-neo/sdk -maxdepth 1 -type d ! -path 'vendor/eui-neo/sdk' | head -1)
          if [ -n "$top_dir" ] && [ ! -d "vendor/eui-neo/sdk/lib" ] && [ -d "$top_dir/lib" ]; then
            mv "$top_dir"/* vendor/eui-neo/sdk/ 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO SDK extracted (Linux)"
          ls vendor/eui-neo/sdk/lib/ || { echo "WARNING: lib/ not found in SDK"; ls -la vendor/eui-neo/sdk/; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install GalaxyOS + PyInstaller
        shell: bash
        run: |
          pip install pyinstaller
          pip install -r requirements-core.txt
          pip install "openjiuwen>=0.1.13"
          pip install "pymilvus>=2.6.2,<2.6.10"
          pip install jiuwenswarm
          pip install .

      - name: Build GalaxyOS MCP with PyInstaller
        shell: bash
        run: |
          pyinstaller galaxyos-mcp.spec --noconfirm
          cp -r dist/galaxyos-mcp galaxyos-mcp-dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install tauri-cli
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop-tauri
        shell: bash
        run: cargo tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          EUI_NEO_ROOT: "${{ github.workspace }}/vendor/eui-neo"

      - name: Upload Tauri artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: desktop-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Tauri artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: desktop-tauri/target/release/bundle/deb/*.deb

  create-release:
    needs: [build-wheel, build-docker, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts/ -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GalaxyOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## Installation

            **Python package:**
            ```bash
            pip install galaxyos==${{ github.ref_name }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/xkzs2007/galaxyos-desktop:${{ github.ref_name }}
            ```

            **Desktop (Tauri):**
            Download the installer for your platform below.
