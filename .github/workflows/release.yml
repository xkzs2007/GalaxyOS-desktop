name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kernel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INSTALL_HEAVY=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tauri:
    name: Build Tauri ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-24.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout GalaxyOS
        uses: actions/checkout@v4

      - name: Checkout Agent Studio
        uses: actions/checkout@v4
        with:
          repository: openJiuwen-ai/agent-studio
          path: agent-studio
          ref: v0.1.8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Studio frontend
        working-directory: agent-studio/frontend
        shell: bash
        run: |
          npm install --legacy-peer-deps
          npm install --save --legacy-peer-deps @mantine/core@^8.3.11 @mantine/hooks@^8.3.11 @mantine/utils@^6.0.22 @assistant-ui/core@0.1.8
          npx vite build --mode production

      - name: Copy Studio dist for Tauri
        shell: bash
        run: |
          mkdir -p studio-dist
          cp -r agent-studio/frontend/dist/* studio-dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install GalaxyOS + PyInstaller
        shell: bash
        run: |
          pip install pyinstaller
          pip install -r requirements-core.txt
          pip install .

      - name: Build GalaxyOS MCP with PyInstaller
        shell: bash
        run: |
          pyinstaller galaxyos-mcp.spec --noconfirm
          cp -r dist/galaxyos-mcp galaxyos-mcp-dist

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build Tauri app
        working-directory: desktop-tauri
        shell: bash
        run: cargo tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload Tauri artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: desktop-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Tauri artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: desktop-tauri/target/release/bundle/appimage/*.AppImage

  create-release:
    needs: [build-wheel, build-docker, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts/ -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GalaxyOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## Installation

            **Python package:**
            ```bash
            pip install galaxyos==${{ github.ref_name }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/xkzs2007/galaxyos-desktop:${{ github.ref_name }}
            ```

            **Desktop (Tauri):**
            Download the installer for your platform below.
