name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.buildkit
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INSTALL_HEAVY=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tauri:
    name: Build Tauri ${{ matrix.platform }}
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            use_container: false
            args: ""
          - platform: ubuntu-24.04
            use_container: true
            args: ""
    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.use_container && 'ghcr.io/xkzs2007/galaxyos-desktop:latest' || '' }}
    steps:
      - name: Checkout GalaxyOS
        uses: actions/checkout@v4

      - name: Install system dependencies (Chocolatey, Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y nsis

      - name: Set up Python 3.12 (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -r requirements-core.txt
          pip install "openjiuwen>=0.1.13"
          pip install "pymilvus>=2.6.2,<2.6.10"
          pip install onnxruntime pyinstaller

      - name: Download bge-small-zh ONNX model
        shell: bash
        run: |
          mkdir -p models/embeddings
          if [ -f models/embeddings/bge-small-zh.onnx ]; then
            echo "Model already exists, skipping download"
          else
            curl -sLf "https://hf-mirror.com/BAAI/bge-small-zh-v1.5/resolve/main/onnx/model.onnx" \
              -o models/embeddings/bge-small-zh.onnx
            echo "Model downloaded: $(ls -lh models/embeddings/bge-small-zh.onnx)"
          fi

      - name: Install GalaxyOS + PyInstaller
        shell: bash
        run: |
          pip install .
          pip install pyinstaller

      - name: Build GalaxyOS MCP with PyInstaller
        shell: bash
        run: |
          pyinstaller galaxyos-mcp.spec --noconfirm
          cp -r dist/galaxyos-mcp galaxyos-mcp-dist

      - name: Download EUI-NEO SDK v0.5.2
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sLf "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-sdk.zip" -o eui-neo-sdk.zip
          mkdir -p vendor/eui-neo/sdk
          cd vendor/eui-neo/sdk && unzip -q ../../../eui-neo-sdk.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -d "./lib" ] && [ -d "$top_dir/lib" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO SDK extracted"
          ls lib/ || { echo "ERROR: lib/ not found"; ls -la .; exit 1; }

      - name: Download EUI-NEO Runtime v0.5.2
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -sLf "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-windows-x64-runtime.zip" -o eui-neo-runtime.zip
          mkdir -p vendor/eui-neo/runtime
          cd vendor/eui-neo/runtime && unzip -q ../../../eui-neo-runtime.zip
          top_dir=$(find . -maxdepth 1 -type d ! -name '.' | head -1)
          if [ -n "$top_dir" ] && [ ! -f "./gallery.exe" ] && [ -f "$top_dir/gallery.exe" ]; then
            mv "$top_dir"/* . 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO Runtime extracted"

      - name: Download EUI-NEO SDK v0.5.2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -sLf "https://github.com/sudoevolve/EUI-NEO/releases/download/v0.5.2/EUI-NEO-v0.5.2-linux-x64-sdk.tar.gz" -o eui-neo-sdk.tar.gz
          mkdir -p vendor/eui-neo/sdk
          tar xzf eui-neo-sdk.tar.gz -C vendor/eui-neo/sdk
          top_dir=$(find vendor/eui-neo/sdk -maxdepth 1 -type d ! -path 'vendor/eui-neo/sdk' | head -1)
          if [ -n "$top_dir" ] && [ ! -d "vendor/eui-neo/sdk/lib" ] && [ -d "$top_dir/lib" ]; then
            mv "$top_dir"/* vendor/eui-neo/sdk/ 2>/dev/null || true
            rmdir "$top_dir" 2>/dev/null || true
          fi
          echo "EUI-NEO SDK extracted (Linux)"
          ls vendor/eui-neo/sdk/lib/ || { echo "WARNING: lib/ not found in SDK"; ls -la vendor/eui-neo/sdk/; }
          rm -f vendor/eui-neo/sdk/lib/libharfbuzz.a
          echo "Removed non-PIC libharfbuzz.a (using system libharfbuzz-dev instead)"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-tauri

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libharfbuzz-dev

      - name: Install tauri-cli
        shell: bash
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: desktop-tauri
        shell: bash
        run: cargo tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          EUI_NEO_ROOT: "${{ github.workspace }}/vendor/eui-neo"

      - name: Upload Tauri artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: desktop-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Tauri artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            desktop-tauri/target/release/bundle/deb/*.deb
            desktop-tauri/target/release/bundle/appimage/*.AppImage

  create-release:
    needs: [build-wheel, build-docker, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts/ -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GalaxyOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## Installation

            **Python package:**
            ```bash
            pip install galaxyos==${{ github.ref_name }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/xkzs2007/galaxyos-desktop:${{ github.ref_name }}
            ```

            **Desktop (Tauri):**
            Download the installer for your platform below.
