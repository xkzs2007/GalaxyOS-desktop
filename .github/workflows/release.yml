name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel
        run: |
          ls -la dist/
          python -c "
          import zipfile, sys
          wheels = [f for f in __import__('os').listdir('dist') if f.endswith('.whl')]
          if not wheels:
              print('ERROR: no wheel found in dist/'); sys.exit(1)
          w = wheels[0]
          with zipfile.ZipFile(f'dist/{w}') as z:
              top = set(n.split('/')[0] for n in z.namelist() if '/' in n)
              print(f'Wheel: {w}')
              print(f'Top-level packages: {top}')
              assert 'galaxyos' in top or any('galaxyos' in t for t in top), 'galaxyos package not in wheel!'
          print('OK: wheel verified')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kernel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    needs: [build-wheel, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GalaxyOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## Installation

            ```bash
            pip install galaxyos==${{ github.ref_name }}
            ```

            With extras:
            ```bash
            pip install galaxyos[all]==${{ github.ref_name }}
            ```

            Docker:
            ```bash
            docker pull ghcr.io/xkzs2007/galaxyos-desktop:${{ github.ref_name }}
            ```
