name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.buildkit
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INSTALL_HEAVY=1
            TORCH_VARIANT=cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-native:
    name: Build C++ Desktop ${{ matrix.platform }} (${{ matrix.torch_variant }})
    needs: [build-wheel, build-docker]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            torch_variant: cpu
            use_container: false
          - platform: windows-latest
            torch_variant: cuda
            use_container: false
          - platform: ubuntu-24.04
            torch_variant: cpu
            use_container: true
          - platform: ubuntu-24.04
            torch_variant: cuda
            use_container: true
    runs-on: ${{ matrix.platform }}
    container:
      image: ${{ matrix.use_container && 'ghcr.io/xkzs2007/galaxyos-desktop:latest' || '' }}
      options: ${{ matrix.use_container && '--user root' || '' }}
    steps:
      - name: Checkout GalaxyOS
        uses: actions/checkout@v5

      - name: Install system dependencies (Chocolatey, Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install -y nsis

      - name: Set up Python 3.12 (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install -r requirements-core.txt
          pip install "openjiuwen @ git+https://github.com/openJiuwen-ai/agent-core@v0.1.16"
          pip install "pymilvus>=2.6.2,<2.6.10"
          pip install onnxruntime
          if [ "${{ matrix.torch_variant }}" = "cuda" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cu128
            pip install onnxruntime-gpu
          else
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install faiss-cpu transformers pandas
          pip install hnswlib==0.8.0
          pip install nuitka ordered-set zstandard
          pip install pyinstaller

      - name: Install curl (Linux container)
        if: runner.os == 'Linux'
        run: apt-get update -qq && apt-get install -y -qq curl binutils cmake build-essential

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pip install -r requirements-core.txt
          pip install "openjiuwen @ git+https://github.com/openJiuwen-ai/agent-core@v0.1.16"
          pip install "pymilvus>=2.6.2,<2.6.10"
          pip install onnxruntime
          if [ "${{ matrix.torch_variant }}" = "cuda" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cu128
            pip install onnxruntime-gpu
          else
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install faiss-cpu transformers pandas
          pip install hnswlib==0.8.0

      - name: Download bge-small-zh ONNX model
        shell: bash
        run: |
          mkdir -p models/embeddings
          if [ -f models/embeddings/model.onnx ]; then
            echo "Model already exists, skipping download"
          else
            HF_MIRROR="https://hf-mirror.com/onnx-community/bge-small-zh-v1.5-ONNX/resolve/main"
            HF_OFFICIAL="https://huggingface.co/onnx-community/bge-small-zh-v1.5-ONNX/resolve/main"
            for f in onnx/model.onnx onnx/model.onnx_data tokenizer.json; do
              dest="models/embeddings/$(basename $f)"
              curl -sLf --retry 3 --retry-delay 5 --max-time 120 \
                "${HF_MIRROR}/${f}" -o "$dest" || \
              curl -sLf --retry 3 --retry-delay 5 --max-time 120 \
                "${HF_OFFICIAL}/${f}" -o "$dest"
              echo "Downloaded: $dest ($(ls -lh "$dest" | awk '{print $5}'))"
            done
          fi

      - name: Install GalaxyOS + Nuitka
        shell: bash
        run: |
          pip install .
          pip install nuitka ordered-set zstandard
          pip install pyinstaller

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: nuitka-cache
          key: nuitka-${{ runner.os }}-py3.12-${{ matrix.torch_variant }}-${{ hashFiles('galaxyos/**/*.py') }}
          restore-keys: nuitka-${{ runner.os }}-py3.12-${{ matrix.torch_variant }}-

      - name: Build GalaxyOS MCP with Nuitka
        shell: bash
        env:
          TORCH_VARIANT: ${{ matrix.torch_variant }}
          PACKAGING_TOOL: nuitka
        run: |
          python nuitka-build.py

      - name: Checkout EUI-NEO source
        shell: bash
        run: |
          git clone --depth 1 https://github.com/sudoevolve/EUI-NEO.git EUI-NEO
          echo "EUI-NEO source checked out"
          ls EUI-NEO/CMakeLists.txt || { echo "ERROR: EUI-NEO/CMakeLists.txt not found"; exit 1; }


      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          apt-get update -qq
          apt-get install -y -qq cmake build-essential libharfbuzz-dev libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: CMake Configure
        shell: bash
        run: |
          cmake -B desktop-native/build -S desktop-native

      - name: CMake Build
        shell: bash
        run: |
          cmake --build desktop-native/build --config Release

      - name: CPack NSIS (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd desktop-native/build && cpack -G NSIS -C Release

      - name: CPack DEB (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd desktop-native/build && cpack -G DEB

      - name: Upload native artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-${{ matrix.torch_variant }}
          path: desktop-native/build/*.exe

      - name: Upload native artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-${{ matrix.torch_variant }}
          path: desktop-native/build/*.deb


  create-release:
    needs: [build-wheel, build-docker, build-native]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts/ -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: GalaxyOS ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
          files: release-artifacts/**/*
          body: |
            ## Installation

            **Python package:**
            ```bash
            pip install galaxyos==${{ github.ref_name }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/xkzs2007/galaxyos-desktop:${{ github.ref_name }}
            ```

            **Desktop (Native C++):**
            Download the installer for your platform below.

            - **CPU version**: For machines without NVIDIA GPU. Includes torch CPU, onnxruntime, faiss-cpu, hnswlib.
            - **CUDA version**: For machines with NVIDIA GPU. Includes torch CUDA, onnxruntime-gpu, CUDA runtime (no separate CUDA Toolkit install needed).

            > Built with Nuitka. If Nuitka build fails, PyInstaller fallback is used (heavy deps excluded, install manually).
