name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# v9.4-adapted lint workflow.
#
# Drops `mypy` against `extensions/galaxyos/scripts/` (that dir
# was removed in v9.0). Keeps ruff + a per-Python-version compile
# check.
jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check --select=E,F,W --ignore=E501,E402 --exclude=node_modules,target,prebuilt,release,dist,build

  mypy-core:
    name: mypy (services + engine, best-effort)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-core.txt

      - name: Install deps (core only)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install mypy

      - name: Run mypy
        # Best-effort: legacy code has many untyped signatures; we
        # surface them but don't fail the build (matches
        # .cnb.yml `lint` job's `--ignore-missing-imports` setting).
        run: |
          mypy services/ galaxyos/engine/ \
            --ignore-missing-imports --no-error-summary --follow-imports=silent
        continue-on-error: true

  python-compat:
    name: python-compat ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile check all .py files
        run: |
          python -c "
          import py_compile, os, sys
          problems = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '.git', '__pycache__', 'target', 'prebuilt', 'release', 'dist', 'build')]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError:
                          problems.append(path)
          if problems:
              print(f'❌ {len(problems)} files failed to compile on Python {sys.version}:')
              for p in problems: print(f'  {p}')
              sys.exit(1)
          print(f'✅ All Python files compile on {sys.version}')
          "
