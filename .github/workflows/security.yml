name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 08:00 UTC
  workflow_dispatch:

# v9.4-adapted security scan.
#
# Differences from the legacy version:
#   - Drops `injection-scanner-test` (injection_scanner lived in
#     extensions/galaxyos/scripts/ which was removed in v9.0).
#   - Updates the `detect-secrets` regex path list to include
#     desktop-shell/ (the legacy list missed the new directory).
#   - Gitleaks is left in place; runs against the .gitleaks.toml
#     in repo root (or the default config if absent).
jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  detect-secrets:
    name: detect-secrets (grep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect hardcoded secrets in code
        run: |
          echo "🔍 Scanning for hardcoded secrets in source dirs..."
          FOUND=0
          # Look in v9.4 active source dirs (legacy list missed
          # desktop-shell/python/, desktop-shell/src/, etc.).
          SCAN_DIRS="services extensions galaxyos scripts tests desktop-shell"
          # sk- prefixed OpenAI-style API keys
          if grep -rPn 'sk-[a-zA-Z0-9]{20,}' $SCAN_DIRS 2>/dev/null; then
            echo "❌ Suspected OpenAI-style API key"
            FOUND=1
          fi
          # GitHub / CNB tokens
          if grep -rPn '(ghp_|gho_|cnb_)[a-zA-Z0-9]{20,}' $SCAN_DIRS 2>/dev/null; then
            echo "❌ Suspected Git/CNB token"
            FOUND=1
          fi
          if [ "$FOUND" -ne 0 ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
