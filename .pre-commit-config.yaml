# .pre-commit-config.yaml — Git 提交前自动检查
# 安装: pip install pre-commit && pre-commit install
#
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (detect secrets)
        entry: gitleaks detect --no-git --verbose --source
        language: system
        types: [text]
        pass_filenames: true

  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: python -m mypy galaxyos/ --config-file mypy.ini
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -x -q --tb=short
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
