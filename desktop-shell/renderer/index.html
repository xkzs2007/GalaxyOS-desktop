<!DOCTYPE html>
<!--
  GalaxyOS Desktop — renderer entry (D 阶段：TokUI-first).

  Layout: 3 栏 ZCode 风格 sidebar / main / details
    ┌──────────┬──────────────────────────┬──────────────┐
    │ sidebar  │  tokui-container (流式)  │  details     │
    │  -host   │  composer-host (输入)    │  -host       │
    └──────────┴──────────────────────────┴──────────────┘

  所有 UI 渲染都通过 src/main.js → bootTokUI() → TokUI 组件完成。
  本文件只提供挂载点（#sidebar-host / #tokui-container / #composer-host /
  #details-host）。弹窗由 TokUI [dialog] 按需创建。

  TokUI 加载策略：
    - 默认从 unpkg CDN 加载（开发 / smoke test / 用户没跑 npm install 时）
    - Electron 模式下 main.ts 会在 did-finish-load 后通过
      webContents.executeJavaScript 注入本地 UMD（覆盖 window.TokUI），
      使生产环境完全离线可用。
    - CSP 在 meta 里允许 https://unpkg.com 拉 UMD + CSS。

  D 阶段改动：
    - 删所有手写 sidebar / composer / settings modal / iw-modal fallback。
      如果 TokUI 加载失败，runtime.js 的 makeStubRenderer 会渲染
      简单文本回退，不再依赖手写 HTML。
    - install-wizard 全面 TokUI 化：[dialog] 弹窗 + [progress] 进度条 +
      [terminal] 日志面板 + [picker] 预设选择 + [upd] 动态更新。
-->
<html lang="zh-CN" data-tokui-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://unpkg.com https://esm.sh; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://esm.sh; style-src 'self' 'unsafe-inline' https://unpkg.com https://esm.sh; img-src 'self' data:; connect-src 'self' http://127.0.0.1:5758 ws://127.0.0.1:5758 https://esm.sh;" />
  <title>GalaxyOS Desktop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/@jboltai/tokui/dist/tokui.css" />
  <style>
    :root {
      color-scheme: dark;
      color: #e8edf8;
      background: #07090f;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      --surface-1: rgba(11, 14, 21, 0.94);
      --surface-2: rgba(16, 21, 33, 0.97);
      --surface-3: rgba(25, 32, 47, 0.95);
      --surface-border: rgba(255, 255, 255, 0.09);
      --surface-border-strong: rgba(255, 255, 255, 0.16);
      --surface-strong: rgba(255, 255, 255, 0.12);
      --surface-muted: rgba(255, 255, 255, 0.06);
      --accent: #7b8dff;
      --accent-strong: #5ce1c7;
      --accent-soft: rgba(123, 141, 255, 0.16);
      --text-primary: #f6f8ff;
      --text-secondary: rgba(232, 237, 248, 0.72);
      --shadow-soft: 0 18px 50px rgba(0, 0, 0, 0.22);
      --shadow-card: 0 12px 30px rgba(0, 0, 0, 0.16);
      --panel-radius: 28px;
      --panel-gap: 14px;
      --page-gap: 16px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; height: 100%; width: 100%; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(44, 109, 255, 0.18), transparent 24%),
                  radial-gradient(circle at 80% 15%, rgba(92, 225, 199, 0.14), transparent 18%),
                  linear-gradient(180deg, #060811 0%, #090d16 100%);
      color: var(--text-primary);
      overflow: hidden;
    }
    #app {
      display: grid;
      grid-template-columns: minmax(260px, 280px) minmax(0, 1fr) minmax(280px, 360px);
      gap: var(--page-gap);
      min-height: 100vh;
      padding: 16px;
      max-width: 100vw;
    }
    .sidebar,
    .main,
    .details {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: linear-gradient(180deg, var(--surface-2), var(--surface-1));
      border: 1px solid var(--surface-border);
      border-radius: var(--panel-radius);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      backdrop-filter: blur(24px);
    }
    .sidebar { min-width: 260px; max-width: 320px; }
    .main { min-width: 0; }
    .details { min-width: 0; max-width: 360px; }
    #sidebar-host,
    #details-host {
      flex: 1 1 0;
      min-height: 0;
      overflow: auto;
      padding: 18px 16px 20px;
    }
    #tokui-container {
      flex: 1 1 0;
      min-height: 0;
      overflow: auto;
      padding: 20px 18px 18px;
    }
    #composer-host {
      border-top: 1px solid var(--surface-muted);
      padding: 14px 16px 18px;
      background: linear-gradient(180deg, rgba(11,14,21,0.95), rgba(12,16,24,0.99));
    }
    .workspace-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 14px;
      margin-bottom: 12px;
      border: 1px solid var(--surface-border);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(123, 141, 255, 0.2), rgba(13, 18, 29, 0.92));
      box-shadow: var(--shadow-card);
    }
    .workspace-toolbar__brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .workspace-toolbar__logo {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #08111d;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(81, 215, 177, 0.16);
    }
    .workspace-toolbar__title { font-size: 14px; font-weight: 700; }
    .workspace-toolbar__subtitle { font-size: 12px; color: rgba(232,237,248,0.68); }
    .workspace-toolbar__meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .workspace-toolbar__meta-pill {
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #dce7ff;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .workspace-toolbar__status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #dce7ff;
      font-size: 12px;
      white-space: nowrap;
    }
    .workspace-toolbar__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #51d7b1;
      box-shadow: 0 0 0 4px rgba(81, 215, 177, 0.16);
    }
    .welcome-hero {
      padding: 20px;
      margin: 8px 0 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(24,31,46,0.96), rgba(8,12,20,0.97));
      box-shadow: var(--shadow-card);
    }
    .welcome-hero__eyebrow {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      margin-bottom: 10px;
      background: var(--accent-soft);
      color: #8eb2ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .welcome-hero__title { margin: 0 0 8px; font-size: 22px; }
    .welcome-hero__subtitle { margin: 0; color: rgba(232,237,248,0.74); line-height: 1.6; }
    .welcome-hero__metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .welcome-hero__metric {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .welcome-hero__metric-value {
      font-size: 16px;
      font-weight: 700;
      color: #f8fbff;
    }
    .welcome-hero__metric-label {
      margin-top: 3px;
      font-size: 11px;
      color: rgba(232,237,248,0.68);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .welcome-hero__chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .welcome-hero__chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #e2e9ff;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .task-panel {
      padding: 16px;
      margin-top: 12px;
      border-radius: 18px;
      border: 1px solid var(--surface-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .task-panel__header { margin-bottom: 10px; }
    .task-panel__title { font-size: 14px; font-weight: 700; }
    .task-panel__summary { margin-top: 4px; font-size: 12px; color: rgba(232,237,248,0.7); }
    .task-panel__list { margin: 0; padding: 0; list-style: none; color: #e2e9ff; display: grid; gap: 8px; }
    .task-panel__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      font-size: 13px;
    }
    .task-panel__item::before {
      content: '';
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .task-panel__item--active::before { background: var(--accent-strong); box-shadow: 0 0 0 4px rgba(92,225,199,0.16); }
    .task-panel__item--pending::before { background: #8fa7ff; }
    .task-panel__item--muted::before { background: rgba(255,255,255,0.18); }
    .task-panel__item-title { display: block; }
    .task-panel__item-meta {
      font-size: 11px;
      color: rgba(232,237,248,0.65);
      white-space: nowrap;
    }
    .hidden { display: none !important; }
    @media (max-width: 1360px) {
      #app { grid-template-columns: minmax(240px, 260px) minmax(0, 1fr) minmax(260px, 320px); }
    }
    @media (max-width: 1120px) {
      #app { grid-template-columns: minmax(0, 1fr); }
      .details { display: none; }
      .sidebar { max-width: none; }
    }
    @media (max-width: 840px) {
      #app { padding: 10px; gap: 10px; }
      .sidebar, .main { border-radius: 22px; }
      #composer-host { padding: 12px 14px 16px; }
      .welcome-hero__metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- LEFT — sidebar mount point (TokUI [conversations][card][dot]) -->
    <aside class="sidebar">
      <div id="sidebar-host"></div>
    </aside>

    <!-- CENTER — main chat + composer (TokUI mount points) -->
    <main class="main">
      <div id="tokui-container" class="tokui-container"></div>
      <div id="composer-host"></div>
    </main>

    <!-- RIGHT — details mount point (TokUI [card][md][tag]) -->
    <aside class="details" id="details-panel">
      <div id="details-host"></div>
    </aside>

  </div>

  <!-- Install wizard dialog — fully rendered by TokUI [dialog] component.
       install-wizard.js renders [dialog id:iw-dialog] into a dynamic host div
       (iw-dialog-host, created at runtime). No hand-rolled markup needed. -->

  <!-- TokUI UMD. The page also works if the script fails to load — main.js
       falls back to makeStubRenderer() (text-only renderer) after 3s. -->
  <script src="https://unpkg.com/@jboltai/tokui/dist/tokui.umd.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
