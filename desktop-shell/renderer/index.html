<!DOCTYPE html>
<!--
  GalaxyOS Desktop — renderer entry (D 阶段：TokUI-first).

  Layout: 3 栏 ZCode 风格 sidebar / main / details
    ┌──────────┬──────────────────────────┬──────────────┐
    │ sidebar  │  tokui-container (流式)  │  details     │
    │  -host   │  composer-host (输入)    │  -host       │
    └──────────┴──────────────────────────┴──────────────┘

  所有 UI 渲染都通过 src/main.js → bootTokUI() → TokUI 组件完成。
  本文件只提供挂载点（#sidebar-host / #tokui-container / #composer-host /
  #details-host）。弹窗由 TokUI [dialog] 按需创建。

  TokUI 加载策略：
    - 默认从 unpkg CDN 加载（开发 / smoke test / 用户没跑 npm install 时）
    - Electron 模式下 main.ts 会在 did-finish-load 后通过
      webContents.executeJavaScript 注入本地 UMD（覆盖 window.TokUI），
      使生产环境完全离线可用。
    - CSP 在 meta 里允许 https://unpkg.com 拉 UMD + CSS。

  D 阶段改动：
    - 删所有手写 sidebar / composer / settings modal / iw-modal fallback。
      如果 TokUI 加载失败，runtime.js 的 makeStubRenderer 会渲染
      简单文本回退，不再依赖手写 HTML。
    - install-wizard 全面 TokUI 化：[dialog] 弹窗 + [progress] 进度条 +
      [terminal] 日志面板 + [picker] 预设选择 + [upd] 动态更新。
-->
<html lang="zh-CN" data-tokui-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://unpkg.com https://esm.sh; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://esm.sh; style-src 'self' 'unsafe-inline' https://unpkg.com https://esm.sh; img-src 'self' data:; connect-src 'self' http://127.0.0.1:5758 ws://127.0.0.1:5758 https://esm.sh;" />
  <title>GalaxyOS Desktop</title>
  <link rel="stylesheet" href="https://unpkg.com/@jboltai/tokui/dist/tokui.css" />
</head>
<body>
  <div id="app">

    <!-- LEFT — sidebar mount point (TokUI [conversations][card][dot]) -->
    <aside class="sidebar">
      <div id="sidebar-host"></div>
    </aside>

    <!-- CENTER — main chat + composer (TokUI mount points) -->
    <main class="main">
      <div id="tokui-container" class="tokui-container"></div>
      <div id="composer-host"></div>
    </main>

    <!-- RIGHT — details mount point (TokUI [card][md][tag]) -->
    <aside class="details" id="details-panel">
      <div id="details-host"></div>
    </aside>

  </div>

  <!-- Install wizard dialog — fully rendered by TokUI [dialog] component.
       install-wizard.js renders [dialog id:iw-dialog] into a dynamic host div
       (iw-dialog-host, created at runtime). No hand-rolled markup needed. -->

  <!-- TokUI UMD. The page also works if the script fails to load — main.js
       falls back to makeStubRenderer() (text-only renderer) after 3s. -->
  <script src="https://unpkg.com/@jboltai/tokui/dist/tokui.umd.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
