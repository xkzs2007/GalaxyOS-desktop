<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:5758 ws://127.0.0.1:5758;" />
  <title>GalaxyOS Desktop</title>
  <!--
    TokUI CSS is loaded EITHER:
      (a) from the CDN (https://unpkg.com/@jboltai/tokui) when no
          local node_modules is present (standalone mode — used by
          Playwright smoke tests and first-launch)
      (b) from a local node_modules copy when @jboltai/tokui is
          installed (Electron production mode — main.ts injects the
          UMD via webContents.executeJavaScript)
    We default to (a) so the page works even without npm install.
    The CSP allows unpkg.com via the meta tag below.
  -->
  <link rel="stylesheet" href="https://unpkg.com/@jboltai/tokui/dist/tokui.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- LEFT SIDEBAR — sessions + actions (ZCode/Codex pattern) -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo">●</span>
        <span class="brand">GalaxyOS</span>
        <span class="version" id="version-tag">stage 2.0</span>
      </div>

      <button class="new-chat-btn" id="new-chat-btn">
        <span class="icon">+</span>
        <span>新对话</span>
      </button>

      <div class="sessions-section">
        <div class="section-label">会话</div>
        <ul class="sessions-list" id="sessions-list">
          <!-- populated by sessions.js -->
        </ul>
      </div>

      <div class="skills-section">
        <div class="section-label">已加载技能</div>
        <ul class="skills-list" id="skills-list">
          <li class="skill-pill">shell_run</li>
          <li class="skill-pill">read_file</li>
          <li class="skill-pill">write_file</li>
          <li class="skill-pill">list_dir</li>
          <li class="skill-pill">grep</li>
          <li class="skill-pill">apply_diff</li>
        </ul>
      </div>

      <div class="sidebar-footer">
        <div class="conn-row">
          <span id="conn-indicator" class="dot"></span>
          <span id="conn-text">连接中…</span>
        </div>
        <div class="conn-row sub" id="health-detail"></div>
      </div>
    </aside>

    <!-- CENTER — main chat (TokUI mounts here) -->
    <main class="main">
      <header class="topbar">
        <div class="crumbs">
          <span class="crumb">GalaxyOS</span>
          <span class="sep">/</span>
          <span class="crumb" id="active-session-name">默认会话</span>
        </div>
        <div class="topbar-actions">
          <button class="model-picker" id="model-picker" title="切换模型">
            <span class="model-dot"></span>
            <span class="model-name" id="model-name">Qwen-2.5</span>
            <span class="model-chevron">▾</span>
          </button>
          <span class="stage-badge" id="stage-badge">stage 2.1 · TokUI</span>
        </div>
      </header>

      <div id="tokui-container" class="tokui-container">
        <!-- TokUI mount point. The client renders streamed DSL here. -->
      </div>

      <!-- Model picker dropdown (hidden by default) -->
      <div class="model-picker-menu" id="model-picker-menu" hidden>
        <div class="menu-title">选择模型</div>
        <button class="model-option" data-model="Qwen-2.5">
          <span class="model-dot"></span>
          <span class="model-label">Qwen-2.5</span>
          <span class="model-desc">默认 — 通用快</span>
        </button>
        <button class="model-option" data-model="Qwen-3">
          <span class="model-dot"></span>
          <span class="model-label">Qwen-3</span>
          <span class="model-desc">更强推理</span>
        </button>
        <button class="model-option" data-model="DeepSeek-V4">
          <span class="model-dot"></span>
          <span class="model-label">DeepSeek-V4</span>
          <span class="model-desc">代码友好</span>
        </button>
        <button class="model-option" data-model="Gemini-3-Flash">
          <span class="model-dot"></span>
          <span class="model-label">Gemini-3-Flash</span>
          <span class="model-desc">长上下文</span>
        </button>
        <button class="model-option" data-model="LFM-2.5-1.2B">
          <span class="model-dot"></span>
          <span class="model-label">LFM-2.5-1.2B</span>
          <span class="model-desc">本地快（阶段三）</span>
        </button>
      </div>

      <footer class="composer">
        <div class="composer-mode">
          <button class="mode-btn active" data-mode="ask">Ask</button>
          <button class="mode-btn" data-mode="process">Process</button>
          <button class="mode-btn" data-mode="agent" title="Agent — can run shell, read/write files, search">Agent</button>
        </div>
        <div class="composer-input-wrap">
          <textarea id="input" rows="1" autocomplete="off"
                    placeholder="问点什么…（Enter 发送，Shift+Enter 换行）"></textarea>
        </div>
        <button id="send" class="send-btn" disabled>
          <span>发送</span>
        </button>
      </footer>
    </main>

    <!-- RIGHT — details panel (R-CCAM trace, MeMo stages, ACRouter) -->
    <aside class="details" id="details-panel">
      <div class="details-header">
        <span class="section-label">执行详情</span>
        <button class="collapse-btn" id="collapse-details" title="折叠">›</button>
      </div>
      <div class="details-body" id="details-body">
        <div class="empty-state">
          <p>选择一条消息，查看 R-CCAM 推理过程与召回记忆。</p>
          <p class="hint">（阶段二将展示 MeMo 三阶段；阶段三将展示 Agent-as-a-Router 路由。）</p>
        </div>
      </div>
    </aside>

  </div>

  <!-- Load TokUI from CDN so the page works without npm install.
       In Electron production mode, main.ts replaces this with a local
       UMD injection via webContents.executeJavaScript. -->
  <script src="https://unpkg.com/@jboltai/tokui/dist/tokui.umd.js"></script>
  <script type="module" src="renderer.js"></script>
  <script src="sessions.js"></script>
  <script src="model_picker.js"></script>
</body>
</html>
