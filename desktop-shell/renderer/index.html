<!DOCTYPE html>
<!--
  GalaxyOS Desktop — renderer entry (D 阶段：TokUI-first).

  Layout: 3 栏 ZCode 风格 sidebar / main / details
    ┌──────────┬──────────────────────────┬──────────────┐
    │ sidebar  │  tokui-container (流式)  │  details     │
    │  -host   │  composer-host (输入)    │  -host       │
    └──────────┴──────────────────────────┴──────────────┘

  所有 UI 渲染都通过 src/main.js → bootTokUI() → TokUI 组件完成。
  本文件只提供挂载点（#sidebar-host / #tokui-container / #composer-host /
  #details-host）和最小可见的 install-wizard 弹窗（#iw-modal，启动模型
  下载时由 IPC 触发显示）。

  TokUI 加载策略：
    - 默认从 unpkg CDN 加载（开发 / smoke test / 用户没跑 npm install 时）
    - Electron 模式下 main.ts 会在 did-finish-load 后通过
      webContents.executeJavaScript 注入本地 UMD（覆盖 window.TokUI），
      使生产环境完全离线可用。
    - CSP 在 meta 里允许 https://unpkg.com 拉 UMD + CSS。

  D 阶段改动：
    - 删所有手写 sidebar / composer / settings modal fallback（之前 hidden
      兜底）。如果 TokUI 加载失败，runtime.js 的 makeStubRenderer 会渲染
      简单文本回退，不再依赖手写 HTML。
    - iw-modal 保留（install wizard 是 zmq REP/PUB 直驱，TokUI 接管前
      是可见的 UI 部件）。
-->
<html lang="zh-CN" data-tokui-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data:; connect-src 'self' http://127.0.0.1:5758 ws://127.0.0.1:5758;" />
  <title>GalaxyOS Desktop</title>
  <link rel="stylesheet" href="https://unpkg.com/@jboltai/tokui/dist/tokui.css" />
</head>
<body>
  <div id="app">

    <!-- LEFT — sidebar mount point (TokUI [conversations][card][dot]) -->
    <aside class="sidebar">
      <div id="sidebar-host"></div>
    </aside>

    <!-- CENTER — main chat + composer (TokUI mount points) -->
    <main class="main">
      <div id="tokui-container" class="tokui-container"></div>
      <div id="composer-host"></div>
    </main>

    <!-- RIGHT — details mount point (TokUI [card][md][tag]) -->
    <aside class="details" id="details-panel">
      <div id="details-host"></div>
    </aside>

  </div>

  <!-- Install wizard modal — shown when user clicks "下载模型".
       Streams progress lines from the sidecar via zmq PUB → webContents.send
       → ipcRenderer.on('iw:progress'). D 阶段保留手写（TokUI 接管前是
       唯一可见的安装流）。 -->
  <div id="iw-modal" class="iw-modal hidden" role="dialog" aria-labelledby="iw-title">
    <div class="iw-modal-content">
      <div class="iw-header">
        <span id="iw-title">📥 下载 LFM2.5-1.2B 模型</span>
        <button id="iw-close" class="iw-close" aria-label="关闭">×</button>
      </div>
      <div class="iw-status">
        <div id="iw-status-line" class="iw-status-line">准备中…</div>
        <div class="iw-progress-bar"><div id="iw-progress-fill" class="iw-progress-fill"></div></div>
        <div class="iw-meta">
          <span id="iw-elapsed">0.0s</span>
          <span id="iw-stage">starting</span>
        </div>
      </div>
      <pre id="iw-log" class="iw-log" aria-live="polite"></pre>
      <div class="iw-actions">
        <select id="iw-preset" class="iw-preset">
          <option value="lfm-onnx-q4">LFM2.5-1.2B ONNX Q4 (~1.2GB, 推荐)</option>
          <option value="lfm-onnx-fp16">LFM2.5-1.2B ONNX FP16 (~2.4GB)</option>
          <option value="lfm-safetensors">LFM2.5-1.2B safetensors (~2.2GB)</option>
          <option value="embedding">BGE-small-zh ONNX (~96MB)</option>
          <option value="check">仅系统体检 (--check)</option>
        </select>
        <button id="iw-start" class="iw-start">开始下载</button>
      </div>
    </div>
  </div>

  <!-- TokUI UMD. The page also works if the script fails to load — main.js
       falls back to makeStubRenderer() (text-only renderer) after 3s. -->
  <script src="https://unpkg.com/@jboltai/tokui/dist/tokui.umd.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
